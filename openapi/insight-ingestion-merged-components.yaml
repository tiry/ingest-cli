        ```
              [Optional]        +------------------------+
              +---------------> |   /v1/check-digest     |
              |                 +------------------------+
              v
        +---------------------+    +------------------------+   
        +--------------------------+

        | Local Repository    |    |   /v1/presigned-urls   |    |   
        /v1/ingestion-events  |

        | (ACS, OnBase, etc.) | -> |  (1 <= count <= 100)   | -> |  
        (createOrUpdate, etc.) |

        +---------------------+    +------------------------+   
        +--------------------------+
              Upload Files                Return Up to 100              Send metadata
              to S3 using                 presigned URLs                 references
              pre-signed URLs
        ```
      operationId: presignedUrls
      x-amazon-apigateway-integration:
        type: HTTP
        httpMethod: POST
        uri: ${INSIGHT_INGESTION_ROOT_NCP}/v1/presigned-urls
        connectionType: VPC_LINK
